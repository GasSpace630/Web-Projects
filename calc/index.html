<!-- Calculator App in HTML -->
<!DOCTYPE HTML>
<html>
<head>
	<meta name="viewport" content="width=device-width, intial-scale=1.0">
	<meta charset="UTF-8">
	<title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

<div id="calc">
<div id="calc-title">
    <h1>CALCULATOR: 1.0</h1>
    <p>By GasSpace</p>
</div>
<input type="text" id="result-field">
<div id="calc-buttons">
    <!-- Chenge the input to buttons -->
    <input type="button" id="btn-1" class="calc-input-btn" value="1">
    <input type="button" id="btn-2" class="calc-input-btn" value="2">
    <input type="button" id="btn-3" class="calc-input-btn" value="3">
    <input type="button" id="clr" class="calc-input-btn" value="C">
    <input type="button" id="backspace" class="calc-input-btn" value="BS"><br>
    <input type="button" id="btn-4" class="calc-input-btn" value="4">
    <input type="button" id="btn-5" class="calc-input-btn" value="5">
    <input type="button" id="btn-6" class="calc-input-btn" value="6">
    <input type="button" id="add" class="calc-input-btn" value="+">
    <input type="button" id="sub" class="calc-input-btn" value="-"><br>
    <input type="button" id="btn-7" class="calc-input-btn" value="7">
    <input type="button" id="btn-8" class="calc-input-btn" value="8">
    <input type="button" id="btn-9" class="calc-input-btn" value="9">
    <input type="button" id="mul" class="calc-input-btn" value="*">
    <input type="button" id="div" class="calc-input-btn" value="/"><br>
    <input type="button" id="dot" class="calc-input-btn" value=".">
    <input type="button" id="btn-0" class="calc-input-btn" value="0">
    <input type="button" id="eql" class="calc-input-btn" value="=">
    <input type="button" id="btn-bra-o" class="calc-input-btn" value="(">
    <input type="button" id="btn-bra-c" class="calc-input-btn" value=")">
</div>
</div>

<body>
</html>
