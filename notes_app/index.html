<!DOCTYPE HTML>
<html>
<head>
	<title>Notes App</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="app">
		<div id="side-bar">
			<h3>notes:</h3>
			<div id="notes-list"></div>
			<button id="clear-data-btn">CLEAR DATA</button>
		</div>
		<div id="editor-area">
			<div id="top-bar">
				<h3 id="note-name-lbl"></h3>
				<button id="new-btn">New</button>
				<button id="open-btn">Open</button>
				<button id="save-btn">Save</button>
				<button id="save-as-btn">Save As</button>
				<button id="options-btn">Options</button>
			</div>
			<div id="editor-container">
				<div id="line-numbers">sdk</div>
				<textarea
					placeholder="Type stuff!"
					id="editor"
				>
				</textarea>
			</div>
			<div id="status-bar">
				<p id="cursor-pos">0 : 0</p>
				<p> | </p>
			</div>
		</div>
	</div>
	
	<div id="prompt-dialog" hidden> 
		<input id="note-name" type="text" placeholder="Name your note">
		<br><br>
		<button id="cancel-btn">Cancel</button>
		<button id="ok-btn">OK</button>
	</div>

	<script src="script.js"></script>
</body>
</html>
