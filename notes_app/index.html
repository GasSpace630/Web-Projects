<!DOCTYPE HTML>
<html>
<head>
    <title>Notes App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="note-edit">
    <h1>Note Editor</h1>
        <div id="top-bar">
            <p id="note-name-lbl">note-name</p>
            <button id="new-btn">New</button>
            <button id="open-btn">Open</button>
            <button id="save-btn">Save</button>
            <button id="save-as-btn">Save As</button>
            <button id="options-btn">Options</button>
        </div>
        <textarea
            placeholder="Type stuff!"
            id="editor"
        ></textarea>
        <h3>notes:</h3>
    <div id="notes-list">
        <h3>Notes:</h3>
    </div>
    </div>
    
    <div id="prompt-dialog" hidden> 
        <input id="note-name" type="text" placeholder="Enter Note Name">
        <br><br>
        <button id="cancel-btn">Cancel</button>
        <button id="ok-btn">OK</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
